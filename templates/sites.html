{% extends "base.html" %}

{% block title %}{{ _("Sites") }} - {{ app_title }}{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
    <h4 class="mb-0"><i class="bi bi-link-45deg"></i> {{ _("Sites") }}</h4>
    <div class="d-flex align-items-center gap-2 flex-wrap">
        <span class="badge bg-secondary" id="ws-indicator" role="button" onclick="toggleWebSocket()" title="{{ _('Click to toggle auto-update') }}" style="cursor:pointer">{{ _("Connecting...") }}</span>
        <button class="btn btn-outline-secondary btn-sm d-none" id="btn-add-group" onclick="openGroupModal(null)">
            <i class="bi bi-folder-plus"></i> {{ _("Add Group") }}
        </button>
        <button class="btn btn-primary btn-sm" onclick="openLinkModal(null)">
            <i class="bi bi-plus-lg"></i> {{ _("Add Link") }}
        </button>
    </div>
</div>

<div id="sites-container">
    <div class="text-muted text-center py-5">{{ _("Loading...") }}</div>
</div>

<!-- Link Modal -->
<div class="modal fade" id="linkModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content modal-styled">
            <div class="modal-header">
                <h5 class="modal-title" id="linkModalTitle"><i class="bi bi-link-45deg"></i> {{ _("Add Link") }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-2 px-3">
                <input type="hidden" id="link-id">
                <div class="stl-field">
                    <label class="stl-label">{{ _("Name") }} *</label>
                    <input type="text" class="form-control form-control-sm" id="link-name" maxlength="200">
                </div>
                <div class="stl-field">
                    <label class="stl-label">URL *</label>
                    <input type="url" class="form-control form-control-sm" id="link-url" placeholder="https://">
                </div>
                <div class="stl-field">
                    <label class="stl-label">{{ _("Description") }}</label>
                    <textarea class="form-control form-control-sm" id="link-description" rows="2" maxlength="500"></textarea>
                </div>
                <div class="stl-field">
                    <label class="stl-label">{{ _("Group") }}</label>
                    <select class="form-select form-select-sm" id="link-group-id">
                        <option value="">{{ _("(No group)") }}</option>
                    </select>
                </div>
                <div class="row g-2">
                    <div class="col-6 stl-field">
                        <label class="stl-label">{{ _("Sort order") }}</label>
                        <input type="number" class="form-control form-control-sm" id="link-sort-order" value="0">
                    </div>
                    <div class="col-6 stl-field">
                        <label class="stl-label">{{ _("Check interval (sec)") }}</label>
                        <input type="number" class="form-control form-control-sm" id="link-check-interval" value="300" min="60" max="3600">
                    </div>
                </div>
                <div class="row g-2">
                    <div class="col-6 stl-field">
                        <label class="stl-label">{{ _("Timeout (sec)") }}</label>
                        <input type="number" class="form-control form-control-sm" id="link-check-timeout" value="10" min="3" max="60">
                    </div>
                </div>
                <div class="d-flex gap-3 mt-2 flex-wrap">
                    <div class="form-check form-check-sm">
                        <input type="checkbox" class="form-check-input" id="link-is-enabled" checked>
                        <label class="form-check-label small" for="link-is-enabled">{{ _("Enabled") }}</label>
                    </div>
                    <div class="form-check form-check-sm">
                        <input type="checkbox" class="form-check-input" id="link-check-enabled" checked>
                        <label class="form-check-label small" for="link-check-enabled">{{ _("Health check") }}</label>
                    </div>
                    <div class="form-check form-check-sm">
                        <input type="checkbox" class="form-check-input" id="link-ssl-verify" checked>
                        <label class="form-check-label small" for="link-ssl-verify">{{ _("Verify SSL") }}</label>
                    </div>
                </div>
                <div class="text-danger d-none small mt-1" id="link-error"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-info btn-sm d-none" id="btn-manual-check" onclick="manualCheck()">
                    <i class="bi bi-arrow-repeat"></i> {{ _("Check now") }}
                </button>
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">{{ _("Cancel") }}</button>
                <button type="button" class="btn btn-primary btn-sm" onclick="saveLink()">{{ _("Save") }}</button>
            </div>
        </div>
    </div>
</div>

<!-- Group Modal (admin only) -->
<div class="modal fade" id="groupModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content modal-styled">
            <div class="modal-header">
                <h5 class="modal-title" id="groupModalTitle"><i class="bi bi-folder-plus"></i> {{ _("Add Group") }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-2 px-3">
                <input type="hidden" id="group-id">
                <div class="stl-field">
                    <label class="stl-label">{{ _("Name") }} *</label>
                    <input type="text" class="form-control form-control-sm" id="group-name" maxlength="100">
                </div>
                <div class="stl-field">
                    <label class="stl-label">{{ _("Description") }}</label>
                    <textarea class="form-control form-control-sm" id="group-description" rows="2" maxlength="500"></textarea>
                </div>
                <div class="row g-2">
                    <div class="col-6 stl-field">
                        <label class="stl-label">{{ _("Color") }}</label>
                        <input type="color" class="form-control form-control-sm form-control-color" id="group-color" value="#6c757d">
                    </div>
                    <div class="col-6 stl-field">
                        <label class="stl-label">{{ _("Sort order") }}</label>
                        <input type="number" class="form-control form-control-sm" id="group-sort-order" value="0">
                    </div>
                </div>
                <div class="stl-field">
                    <label class="stl-label">{{ _("Icon") }} <small class="text-muted">(Bootstrap Icons)</small></label>
                    <input type="text" class="form-control form-control-sm" id="group-icon" placeholder="bi-server">
                </div>
                <div class="text-danger d-none small mt-1" id="group-error"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger btn-sm d-none me-auto" id="btn-delete-group" onclick="deleteGroup()">
                    <i class="bi bi-trash"></i> {{ _("Delete") }}
                </button>
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">{{ _("Cancel") }}</button>
                <button type="button" class="btn btn-primary btn-sm" onclick="saveGroup()">{{ _("Save") }}</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="/static/css/sites.css">
<script src="/static/js/sites.js"></script>
{% endblock %}
