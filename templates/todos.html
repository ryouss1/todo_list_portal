{% extends "base.html" %}
{% block title %}Todos - Todo List Portal{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Todo List</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#todoModal" onclick="openNewTodo()">
        <i class="bi bi-plus-lg"></i> New Todo
    </button>
</div>

<div class="mb-3">
    <div class="btn-group btn-group-sm" role="group">
        <button class="btn btn-outline-secondary active" onclick="filterTodos('all', this)">All</button>
        <button class="btn btn-outline-secondary" onclick="filterTodos('active', this)">Active</button>
        <button class="btn btn-outline-secondary" onclick="filterTodos('completed', this)">Completed</button>
    </div>
    <a href="/todos/public" class="btn btn-outline-info btn-sm ms-2">
        <i class="bi bi-globe"></i> Public Todos
    </a>
</div>

<div id="todo-list"></div>

<div class="modal fade" id="todoModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="todoModalTitle">New Todo</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="todo-id">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control" id="todo-title" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" id="todo-description" rows="3"></textarea>
                </div>
                <div class="row">
                    <div class="col-4 mb-3">
                        <label class="form-label">Priority</label>
                        <select class="form-select" id="todo-priority">
                            <option value="0">Normal</option>
                            <option value="1">High</option>
                            <option value="2">Urgent</option>
                        </select>
                    </div>
                    <div class="col-4 mb-3">
                        <label class="form-label">Due Date</label>
                        <input type="date" class="form-control" id="todo-due-date">
                    </div>
                    <div class="col-4 mb-3">
                        <label class="form-label">Visibility</label>
                        <select class="form-select" id="todo-visibility">
                            <option value="private">Private</option>
                            <option value="public">Public</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveTodo()">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/todos.js"></script>
{% endblock %}
