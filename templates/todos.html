{% extends "base.html" %}
{% block title %}{{ _("Todos") }} - Todo List Portal{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>{{ _("Todo List") }}</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#todoModal" onclick="openNewTodo()">
        <i class="bi bi-plus-lg"></i> {{ _("New Todo") }}
    </button>
</div>

<div class="mb-3">
    <div class="btn-group btn-group-sm" role="group">
        <button class="btn btn-outline-secondary active" onclick="filterTodos('all', this)">{{ _("All") }}</button>
        <button class="btn btn-outline-secondary" onclick="filterTodos('active', this)">{{ _("Active") }}</button>
        <button class="btn btn-outline-secondary" onclick="filterTodos('completed', this)">{{ _("Completed") }}</button>
    </div>
    <a href="/todos/public" class="btn btn-outline-info btn-sm ms-2">
        <i class="bi bi-globe"></i> {{ _("Public Todos") }}
    </a>
</div>

<div id="todo-list"></div>

<div class="modal fade" id="todoModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content modal-styled">
            <div class="modal-header">
                <h5 class="modal-title" id="todoModalTitle">{{ _("New Todo") }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-2 px-3">
                <input type="hidden" id="todo-id">
                <div class="stl-field">
                    <label class="stl-label"><i class="bi bi-type-bold"></i> {{ _("Title") }}</label>
                    <input type="text" class="form-control form-control-sm" id="todo-title" required>
                </div>
                <div class="stl-field">
                    <label class="stl-label"><i class="bi bi-text-left"></i> {{ _("Description") }}</label>
                    <textarea class="form-control form-control-sm" id="todo-description" rows="3"></textarea>
                </div>
                <div class="row">
                    <div class="col-4">
                        <div class="stl-field">
                            <label class="stl-label"><i class="bi bi-flag"></i> {{ _("Priority") }}</label>
                            <select class="form-select form-select-sm" id="todo-priority">
                                <option value="0">{{ _("Normal") }}</option>
                                <option value="1">{{ _("High") }}</option>
                                <option value="2">{{ _("Urgent") }}</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="stl-field">
                            <label class="stl-label"><i class="bi bi-calendar3"></i> {{ _("Due Date") }}</label>
                            <input type="date" class="form-control form-control-sm" id="todo-due-date">
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="stl-field">
                            <label class="stl-label"><i class="bi bi-eye"></i> {{ _("Visibility") }}</label>
                            <select class="form-select form-select-sm" id="todo-visibility">
                                <option value="private">{{ _("Private") }}</option>
                                <option value="public">{{ _("Public") }}</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">{{ _("Cancel") }}</button>
                <button type="button" class="btn btn-primary btn-sm" onclick="saveTodo()">{{ _("Save") }}</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/todos.js"></script>
{% endblock %}
