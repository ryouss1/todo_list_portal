{% extends "base.html" %}
{% block title %}Reports - Todo List Portal{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2><i class="bi bi-journal-text"></i> Daily Reports</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#reportModal" onclick="openNewReport()">
        <i class="bi bi-plus-lg"></i> New Report
    </button>
</div>

<div class="d-flex justify-content-between align-items-center mb-3">
    <ul class="nav nav-tabs mb-0">
        <li class="nav-item">
            <a class="nav-link active" href="#" onclick="switchTab('my', this)">My Reports</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#" onclick="switchTab('all', this)">All Reports</a>
        </li>
    </ul>
    <div class="d-flex align-items-center gap-2">
        <input type="date" class="form-control form-control-sm" id="filter-date" style="width:160px;">
        <button class="btn btn-outline-primary btn-sm" onclick="searchByDate()">
            <i class="bi bi-search"></i>
        </button>
        <button class="btn btn-outline-secondary btn-sm" onclick="clearDateFilter()">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-hover align-middle mb-0" id="report-table" style="display:none;">
        <thead class="table-light">
            <tr>
                <th style="width:110px;">日付</th>
                <th style="width:100px;">分類</th>
                <th>タスク名</th>
                <th style="width:80px;" class="text-end">時間</th>
                <th>作業内容</th>
                <th id="th-author" style="width:110px;display:none;">投稿者</th>
            </tr>
        </thead>
        <tbody id="report-tbody"></tbody>
    </table>
</div>
<div id="report-list"></div>

<div class="modal fade" id="reportModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="reportModalTitle">New Report</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="report-id">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-control" id="report-date" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">タスク分類 *</label>
                        <select class="form-select" id="report-category" required>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">時間（分）</label>
                        <input type="number" class="form-control" id="report-time-minutes" value="0" min="0" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">タスク名 *</label>
                    <input type="text" class="form-control" id="report-task-name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Work Content *</label>
                    <textarea class="form-control" id="report-work-content" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Achievements</label>
                    <textarea class="form-control" id="report-achievements" rows="2"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Issues</label>
                    <textarea class="form-control" id="report-issues" rows="2"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Next Plan</label>
                    <textarea class="form-control" id="report-next-plan" rows="2"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Remarks</label>
                    <textarea class="form-control" id="report-remarks" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveReport()">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/reports.js?v=5"></script>
{% endblock %}
