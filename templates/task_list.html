{% extends "base.html" %}
{% block title %}Task List - Todo List Portal{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2><i class="bi bi-card-list"></i> Task List</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#itemModal" onclick="openNewItem()">
        <i class="bi bi-plus-lg"></i> New Item
    </button>
</div>

<ul class="nav nav-tabs mb-3">
    <li class="nav-item">
        <a class="nav-link active" href="#" onclick="switchTab('mine', this)">My Items</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="#" onclick="switchTab('all', this)">All Items</a>
    </li>
</ul>

<div class="table-responsive">
    <table class="table table-hover align-middle mb-0" id="item-table" style="display:none;">
        <thead class="table-light">
            <tr>
                <th style="width:100px;">Status</th>
                <th>Title</th>
                <th style="width:100px;">Category</th>
                <th style="width:100px;">Date</th>
                <th style="width:80px;" class="text-end">Time</th>
                <th style="width:110px;">Backlog</th>
                <th id="th-assignee" style="width:110px;display:none;">Assignee</th>
                <th style="width:200px;">Actions</th>
            </tr>
        </thead>
        <tbody id="item-tbody"></tbody>
    </table>
</div>
<div id="item-list"></div>

<!-- Create/Edit Modal -->
<div class="modal fade" id="itemModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="itemModalTitle">New Item</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="item-id">
                <div class="mb-3">
                    <label class="form-label">Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="item-title" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" id="item-description" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Scheduled Date</label>
                    <input type="date" class="form-control" id="item-scheduled-date">
                </div>
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="item-category">
                        <option value="">-- None --</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Backlog Ticket</label>
                    <input type="text" class="form-control" id="item-backlog-ticket" placeholder="e.g. WHT-488">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveItem()">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/task_list.js?v=3"></script>
{% endblock %}
