{% extends "base.html" %}
{% block title %}Tasks - Todo List Portal{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Task Timer</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#taskModal" onclick="openNewTask()">
        <i class="bi bi-plus-lg"></i> New Task
    </button>
</div>

<div id="task-list" class="row g-3"></div>

<div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="taskModalTitle">New Task</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="task-id">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control" id="task-title" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" id="task-description" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="task-category">
                        <option value="">-- None --</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Backlog Ticket</label>
                    <input type="text" class="form-control" id="task-backlog-ticket" placeholder="e.g. WHT-488">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveTask()">Save</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="overdueModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Overdue Tasks</h5>
            </div>
            <div class="modal-body">
                <p class="text-muted">The following tasks are from previous days. Please enter the time you finished working on each task.</p>
                <div id="overdue-list"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" onclick="submitOverdue()">Complete All</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/tasks.js?v=8"></script>
{% endblock %}
