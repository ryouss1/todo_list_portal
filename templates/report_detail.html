{% extends "base.html" %}
{% block title %}{{ _("Report Detail") }} - Todo List Portal{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2><i class="bi bi-journal-text"></i> {{ _("Report Detail") }}</h2>
    <div>
        <a href="/reports" class="btn btn-outline-secondary btn-sm me-2">
            <i class="bi bi-arrow-left"></i> {{ _("Back") }}
        </a>
        <span id="owner-actions"></span>
    </div>
</div>

<div id="report-content">
    <div class="text-muted text-center py-4">{{ _("Loading...") }}</div>
</div>

<div class="modal fade" id="editReportModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content modal-styled">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pencil-square"></i> {{ _("Edit Report") }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-2 px-3">
                <ul class="nav nav-pills nav-fill stl-tabs mb-2">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#edit-tab-basic">
                            <i class="bi bi-tag"></i> {{ _("Basic") }}
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#edit-tab-content">
                            <i class="bi bi-pencil-square"></i> {{ _("Content") }}
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#edit-tab-details">
                            <i class="bi bi-list-check"></i> {{ _("Details") }}
                        </button>
                    </li>
                </ul>
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="edit-tab-basic">
                        <div class="row">
                            <div class="col-5">
                                <div class="stl-field">
                                    <label class="stl-label"><i class="bi bi-folder"></i> {{ _("タスク分類") }}</label>
                                    <select class="form-select form-select-sm" id="edit-category" required></select>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="stl-field">
                                    <label class="stl-label"><i class="bi bi-card-text"></i> {{ _("タスク名") }}</label>
                                    <input type="text" class="form-control form-control-sm" id="edit-task-name" required>
                                </div>
                            </div>
                            <div class="col-3">
                                <div class="stl-field">
                                    <label class="stl-label"><i class="bi bi-clock"></i> {{ _("時間（分）") }}</label>
                                    <input type="number" class="form-control form-control-sm" id="edit-time-minutes" value="0" min="0" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6">
                                <div class="stl-field">
                                    <label class="stl-label"><i class="bi bi-link-45deg"></i> Backlog</label>
                                    <input type="text" class="form-control form-control-sm" id="edit-backlog-ticket" placeholder="e.g. WHT-488">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="edit-tab-content">
                        <div class="stl-field">
                            <label class="stl-label"><i class="bi bi-pencil"></i> {{ _("Work Content") }}</label>
                            <textarea class="form-control form-control-sm" id="edit-work-content" rows="4" required></textarea>
                        </div>
                        <div class="stl-field">
                            <label class="stl-label"><i class="bi bi-trophy"></i> {{ _("Achievements") }}</label>
                            <textarea class="form-control form-control-sm" id="edit-achievements" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="edit-tab-details">
                        <div class="stl-field">
                            <label class="stl-label"><i class="bi bi-exclamation-triangle"></i> {{ _("Issues") }}</label>
                            <textarea class="form-control form-control-sm" id="edit-issues" rows="3"></textarea>
                        </div>
                        <div class="stl-field">
                            <label class="stl-label"><i class="bi bi-arrow-right-circle"></i> {{ _("Next Plan") }}</label>
                            <textarea class="form-control form-control-sm" id="edit-next-plan" rows="3"></textarea>
                        </div>
                        <div class="stl-field">
                            <label class="stl-label"><i class="bi bi-chat-left-text"></i> {{ _("Remarks") }}</label>
                            <textarea class="form-control form-control-sm" id="edit-remarks" rows="2"></textarea>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">{{ _("Cancel") }}</button>
                <button type="button" class="btn btn-primary btn-sm" onclick="saveEdit()"><i class="bi bi-check-lg"></i> {{ _("Save") }}</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>const REPORT_ID = {{ report_id }};</script>
<script src="/static/js/report_detail.js?v=6"></script>
{% endblock %}
