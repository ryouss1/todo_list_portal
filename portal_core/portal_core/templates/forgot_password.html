<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _("Forgot Password") }} - {{ app_title }}</title>
    <link href="{{ bootstrap_css_url }}" rel="stylesheet">
    <link href="{{ bootstrap_icons_url }}" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .forgot-card { max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body>
    <div class="forgot-card">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="card-title text-center mb-4">
                    <i class="bi bi-key"></i> {{ _("Password Reset") }}
                </h4>
                <div id="alert-container"></div>
                <div id="success-message" style="display:none;">
                    <div class="alert alert-success">
                        <i class="bi bi-check-circle"></i>
                        {{ _("If an account with that email exists, a reset link has been sent. Please check your email.") }}
                    </div>
                </div>
                <form id="forgot-form">
                    <p class="text-muted mb-3">{{ _("Enter your email address and we'll send you a link to reset your password.") }}</p>
                    <div class="mb-3">
                        <label for="email" class="form-label">{{ _("Email") }}</label>
                        <input type="email" class="form-control" id="email" name="email" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="submit-btn">
                        <i class="bi bi-envelope"></i> {{ _("Send Reset Link") }}
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="/login"><i class="bi bi-arrow-left"></i> {{ _("Back to Login") }}</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertContainer = document.getElementById('alert-container');
            alertContainer.innerHTML = '';
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                    }),
                });
                if (res.ok) {
                    document.getElementById('forgot-form').style.display = 'none';
                    document.getElementById('success-message').style.display = 'block';
                } else {
                    const data = await res.json().catch(() => ({}));
                    alertContainer.innerHTML =
                        '<div class="alert alert-danger">' +
                        (data.detail || 'An error occurred') +
                        '</div>';
                    btn.disabled = false;
                }
            } catch (err) {
                alertContainer.innerHTML =
                    '<div class="alert alert-danger">Network error</div>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
