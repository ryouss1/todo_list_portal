<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _("Reset Password") }} - {{ app_title }}</title>
    <link href="{{ bootstrap_css_url }}" rel="stylesheet">
    <link href="{{ bootstrap_icons_url }}" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .reset-card { max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="card-title text-center mb-4">
                    <i class="bi bi-key"></i> {{ _("Reset Password") }}
                </h4>
                <div id="alert-container"></div>
                <div id="loading" class="text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">{{ _("Loading...") }}</span>
                    </div>
                    <p class="text-muted mt-2">{{ _("Verifying token...") }}</p>
                </div>
                <div id="invalid-token" style="display:none;">
                    <div class="alert alert-danger">
                        <i class="bi bi-x-circle"></i>
                        {{ _("This reset link is invalid or has expired. Please request a new one.") }}
                    </div>
                    <a href="/forgot-password" class="btn btn-outline-primary w-100">
                        <i class="bi bi-envelope"></i> {{ _("Request New Reset Link") }}
                    </a>
                </div>
                <div id="success-message" style="display:none;">
                    <div class="alert alert-success">
                        <i class="bi bi-check-circle"></i>
                        {{ _("Your password has been reset successfully.") }}
                    </div>
                    <a href="/login" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> {{ _("Go to Login") }}
                    </a>
                </div>
                <form id="reset-form" style="display:none;">
                    <div class="mb-3">
                        <label for="new-password" class="form-label">{{ _("New Password") }}</label>
                        <input type="password" class="form-control" id="new-password" required minlength="8">
                    </div>
                    <div class="mb-3">
                        <label for="confirm-password" class="form-label">{{ _("Confirm Password") }}</label>
                        <input type="password" class="form-control" id="confirm-password" required minlength="8">
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="submit-btn">
                        <i class="bi bi-check-lg"></i> {{ _("Reset Password") }}
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="/login"><i class="bi bi-arrow-left"></i> {{ _("Back to Login") }}</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        async function validateToken() {
            const loading = document.getElementById('loading');
            const invalidToken = document.getElementById('invalid-token');
            const resetForm = document.getElementById('reset-form');

            if (!token) {
                loading.style.display = 'none';
                invalidToken.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/auth/validate-reset-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token }),
                });
                const data = await res.json();
                loading.style.display = 'none';
                if (res.ok && data.valid) {
                    resetForm.style.display = 'block';
                } else {
                    invalidToken.style.display = 'block';
                }
            } catch (err) {
                loading.style.display = 'none';
                invalidToken.style.display = 'block';
            }
        }

        validateToken();

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertContainer = document.getElementById('alert-container');
            alertContainer.innerHTML = '';

            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                alertContainer.innerHTML =
                    '<div class="alert alert-danger">Passwords do not match.</div>';
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        new_password: newPassword,
                    }),
                });
                if (res.ok) {
                    document.getElementById('reset-form').style.display = 'none';
                    document.getElementById('success-message').style.display = 'block';
                } else {
                    const data = await res.json().catch(() => ({}));
                    alertContainer.innerHTML =
                        '<div class="alert alert-danger">' +
                        (data.detail || 'An error occurred') +
                        '</div>';
                    btn.disabled = false;
                }
            } catch (err) {
                alertContainer.innerHTML =
                    '<div class="alert alert-danger">Network error</div>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
