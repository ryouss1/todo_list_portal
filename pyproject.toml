[tool.ruff]
target-version = "py39"
line-length = 120
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
]

[tool.ruff.lint.isort]
known-first-party = ["app", "portal_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
